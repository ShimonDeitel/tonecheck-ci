name: ToneCheck
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  ToneCheck:
    type: application
    platform: iOS
    sources:
      - path: ToneCheck
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tonecheck
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: ToneCheck/Info.plist
        CODE_SIGN_ENTITLEMENTS: ToneCheck/ToneCheck.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  ToneCheckTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ToneCheckTests
      - path: ToneCheck.storekit
    dependencies:
      - target: ToneCheck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tonecheck.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  ToneCheckUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ToneCheckUITests
    dependencies:
      - target: ToneCheck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tonecheck.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  ToneCheck:
    build:
      targets:
        ToneCheck: all
        ToneCheckTests: [test]
        ToneCheckUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: ToneCheck.storekit
    test:
      config: Debug
      storeKitConfiguration: ToneCheck.storekit
      targets:
        - ToneCheckTests
        - ToneCheckUITests
    archive:
      config: Release
